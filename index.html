<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SkateShop Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛹 SkateShop Pro</h1>
    <div class="cart">
        🛒 <span id="cart-count">0</span> | $<span id="total">0</span>
    </div>
</header>

<!-- TABLAS -->
<section>
    <h2>Tablas</h2>
    <div class="productos">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b" alt="tabla skate">
            <h3>Tabla Profesional</h3>
            <p>$80</p>
            <button onclick="addToCart('Tabla', 80)">Agregar</button>
        </div>

    </div>
</section>

<!-- RUEDAS -->
<section>
    <h2>Ruedas</h2>
    <div class="productos">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1582738412147-0d6c6f6f7d98" alt="ruedas skate">
            <h3>Ruedas 52mm</h3>
            <p>$30</p>
            <button onclick="addToCart('Ruedas', 30)">Agregar</button>
        </div>

    </div>
</section>

<!-- RODAMIENTOS -->
<section>
    <h2>Rodamientos</h2>
    <div class="productos">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1606813909027-5c9c8c3d93b7" alt="rodamientos">
            <h3>Rodamientos ABEC-7</h3>
            <p>$20</p>
            <button onclick="addToCart('Rodamientos', 20)">Agregar</button>
        </div>

    </div>
</section>

<!-- TRUCKS -->
<section>
    <h2>Trucks</h2>
    <div class="productos">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1621939514649-280e2ee25f60" alt="trucks skate">
            <h3>Trucks Pro</h3>
            <p>$50</p>
            <button onclick="addToCart('Trucks', 50)">Agregar</button>
        </div>

    </div>
</section>

<!-- LIJA -->
<section>
    <h2>Lijas</h2>
    <div class="productos">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1616627983921-5b7b0e92ce5c" alt="lija skate">
            <h3>Lija Antideslizante</h3>
            <p>$15</p>
            <button onclick="addToCart('Lija', 15)">Agregar</button>
        </div>

    </div>
</section>

<!-- STICKERS -->
<section>
    <h2>Stickers</h2>
    <div class="productos">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1593032465171-8f0c7b9b1d6f" alt="stickers">
            <h3>Pack Stickers</h3>
            <p>$10</p>
            <button onclick="addToCart('Stickers', 10)">Agregar</button>
        </div>

    </div>
</section>

<!-- CHECKOUT -->
<section class="checkout">
    <h2>🧾 Tu carrito</h2>
    <ul id="cart-items"></ul>
    <button class="buy" onclick="buy()">Comprar</button>
</section>

<!-- CONTACTO -->
<section class="contacto">
    <h2>📱 Contacto</h2>
    <p>WhatsApp: <strong>+591 700 12345</strong></p>
</section>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;

    document.getElementById("cart-count").innerText = cart.length;
    document.getElementById("total").innerText = total;

    updateCart();
}

function updateCart() {
    const list = document.getElementById("cart-items");
    list.innerHTML = "";

    cart.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item.name + " - $" + item.price;
        list.appendChild(li);
    });
}

function buy() {
    alert("Compra simulada 😎");
}
</script>

</body>
</html>
