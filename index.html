<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SkateShop Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛹 SkateShop</h1>
    <div class="cart">
        🛒 Carrito: <span id="cart-count">0</span> | $<span id="total">0</span>
    </div>
</header>

<section class="productos">

    <div class="card">
        <img src="https://via.placeholder.com/250" alt="">
        <h3>Skate Pro X</h3>
        <p>$80</p>
        <button onclick="addToCart('Skate Pro X', 80)">Agregar</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250" alt="">
        <h3>Skate Street</h3>
        <p>$65</p>
        <button onclick="addToCart('Skate Street', 65)">Agregar</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250" alt="">
        <h3>Skate Cruiser</h3>
        <p>$70</p>
        <button onclick="addToCart('Skate Cruiser', 70)">Agregar</button>
    </div>

</section>

<section class="checkout">
    <h2>Resumen de compra</h2>
    <ul id="cart-items"></ul>
    <button class="buy" onclick="buy()">Comprar</button>
</section>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;

    document.getElementById("cart-count").innerText = cart.length;
    document.getElementById("total").innerText = total;

    updateCart();
}

function updateCart() {
    const list = document.getElementById("cart-items");
    list.innerHTML = "";

    cart.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item.name + " - $" + item.price;
        list.appendChild(li);
    });
}

function buy() {
    if(cart.length === 0){
        alert("Tu carrito está vacío");
    } else {
        alert("Compra realizada con éxito 🎉");
        cart = [];
        total = 0;
        updateCart();
        document.getElementById("cart-count").innerText = 0;
        document.getElementById("total").innerText = 0;
    }
}
</script>

</body>
</html>
