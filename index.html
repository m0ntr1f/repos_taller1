<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SkateShop Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛹 SkateShop</h1>
    <div class="cart">
        🛒 <span id="cart-count">0</span> productos | $<span id="total">0</span>
    </div>
</header>

<section class="productos">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6" alt="">
        <h3>Tabla Skate Pro</h3>
        <p>$80</p>
        <button onclick="addToCart('Tabla Skate Pro', 80)">Agregar</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30" alt="">
        <h3>Ruedas Skate</h3>
        <p>$30</p>
        <button onclick="addToCart('Ruedas Skate', 30)">Agregar</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1616627983921-5b7b0e92ce5c" alt="">
        <h3>Rodamientos</h3>
        <p>$20</p>
        <button onclick="addToCart('Rodamientos', 20)">Agregar</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1616627983880-2bb18ce87140" alt="">
        <h3>Trucks</h3>
        <p>$50</p>
        <button onclick="addToCart('Trucks', 50)">Agregar</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1616627983901-daf4e1d3b9c0" alt="">
        <h3>Lija Skate</h3>
        <p>$15</p>
        <button onclick="addToCart('Lija Skate', 15)">Agregar</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1606813909027-5c9c8c3d93b7" alt="">
        <h3>Pack Stickers</h3>
        <p>$10</p>
        <button onclick="addToCart('Stickers', 10)">Agregar</button>
    </div>

</section>

<section class="checkout">
    <h2>🧾 Resumen</h2>
    <ul id="cart-items"></ul>
    <button class="buy" onclick="buy()">Comprar</button>
</section>

<section class="contacto">
    <h2>📱 Contacto</h2>
    <p>¿Tienes dudas? Escríbenos:</p>
    <p class="telefono">+591 700 12345</p>
</section>

<footer>
    <p>© 2026 SkateShop</p>
</footer>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;

    document.getElementById("cart-count").innerText = cart.length;
    document.getElementById("total").innerText = total;

    updateCart();
}

function updateCart() {
    const list = document.getElementById("cart-items");
    list.innerHTML = "";

    cart.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item.name + " - $" + item.price;
        list.appendChild(li);
    });
}

function buy() {
    if(cart.length === 0){
        alert("Tu carrito está vacío");
    } else {
        alert("Compra realizada 🎉 Te contactaremos pronto");
        cart = [];
        total = 0;
        updateCart();
        document.getElementById("cart-count").innerText = 0;
        document.getElementById("total").innerText = 0;
    }
}
</script>

</body>
</html>
